name: Build & Release APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: 🔑 Create keystore
        if: github.ref_type == 'tag'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/drivecosts.keystore
          echo "KEYSTORE_CREATED=true" >> $GITHUB_ENV

      - name: 🔐 Create keystore.properties
        if: github.ref_type == 'tag'
        run: |
          cat > keystore.properties << EOF
          storeFile=~/.android/drivecosts.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: 📱 Build Debug APK
        if: github.ref_type != 'tag'
        run: ./gradlew assembleDebug -q

      - name: 🚀 Build Release APK
        if: github.ref_type == 'tag'
        run: ./gradlew assembleRelease -q

      - name: 📊 Get APK info
        if: always()
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            ls -lh app/build/outputs/apk/release/*.apk
            echo "APK_PATH=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_ENV
          elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            ls -lh app/build/outputs/apk/debug/*.apk
            echo "APK_PATH=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV
          fi

      - name: 📤 Upload APK as artifact
        if: always() && env.APK_PATH != ''
        uses: actions/upload-artifact@v3
        with:
          name: drivecosts-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: 🏷️ Get version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📤 Create Release
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APK_PATH }}
          body: |
            ## DriveCosts ${{ env.RELEASE_VERSION }}
            
            ### 📦 Release Notes
            - APK build: successful
            - Version: ${{ env.RELEASE_VERSION }}
            - Architecture: ARM64-v8a
            
            ### 📝 Installation
            1. Download `app-release.apk`
            2. Install on your Android device
            3. Or upload to Google Play Console
            
            ### 🔒 Signature
            - Signed with release keystore
            - SHA-256 fingerprint verified
            
            **Ready for production deployment!**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build completed successfully!"
            if [ "${{ github.ref_type }}" == "tag" ]; then
              echo "🚀 Release created: ${{ env.RELEASE_VERSION }}"
            fi
          else
            echo "❌ Build failed"
          fi

  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🧪 Run unit tests
        run: ./gradlew test -q

      - name: 📊 Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: 'app/build/test-results/**/*.xml'
          reporter: 'java-junit'
          fail-on-error: false

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔍 Run lint
        run: ./gradlew lint -q
        continue-on-error: true

      - name: 📈 Upload lint report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 14
